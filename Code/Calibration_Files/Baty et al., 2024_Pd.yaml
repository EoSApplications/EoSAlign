# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Baty et al., 2024
category: 1
composition: Pd  # fcc-Pd
method: XRD
technique: DAC
DAC_type: membrane DAC
culet: 150–300  # um (150 um culets beveled to 300 um)
cal_to_name: Dewaele et al., 2004
cal_to_composition: W

eos: Birch-Murnaghan
order: 3
V0_per_atom: 14.72  # Å^3/atom
V0_unc: 0.04
K0: 190  # GPa
is_K0_fixed: no
atomic_number: 46
K0_unc: 3
K0_prime: 5.3
K0_prime_unc: 0.2
max_pressure: 80  # GPa
PTM: He
gasket: Re
synchrotron: Diamond Light Source I15
peaks_used_to_fit_sample: 111; 200; 220; 311
reference_temperature: 300 K
sample_heating: none
data_quality_notes: |
  Angular-dispersive powder XRD measurements of fcc-Pd were
  conducted using He as a pressure-transmitting medium.
  Unit-cell volumes were obtained from Pawley refinements.
  No structural phase transition was observed up to 80 GPa.

  The EOS parameters reported here correspond to the authors’
  BM3 description of their own experimental data, which is
  consistent with higher-pressure EOS results from Frost et al. (2023).
doi: 10.1063/5.0179469
notes: |
  The reported EOS parameters (V0 = 14.72(4) Å^3/atom,
  K0 = 190(3) GPa, K0' = 5.3(2)) describe the 300 K static
  compression data collected in this study.

  This EOS should be treated as a mid-pressure (≤80 GPa)
  experimental reference. For ultra-high-pressure applications
  (>100 GPa), Frost et al. (2023) provides a more appropriate
  primary Pd EOS.

peaks_used_to_fit_sample: # not specified
reference_temperature: 300 K
sample_heating: laser-annealed to 1600 K; external heating to 1000 K for P–V–T
data_quality_notes: |
  Vinet EOS fit to combined room-temperature Ne compression data from this study
  and previous experiments, with pressures based on internally consistent Au and Pt scales

notes: |
  Copper equation of state was calibrated using t-DAC up to 431 GPa (culet 20 um, Run #1a) and conventional DAC up to 88 GPa (culet 300 um, Run #1b).
  Calibration path: Cu (primary scale, based on Fratanduono et al., 2020). All EoS parameters except K0_prime and K_infinity_prime_unc were fixed to values from Fratanduono et al., 2020, as cited by Sakai et al., 2025.
  The Rydberg–Stacey EoS parameters for Cu are listed in Table 2.
  For further details on data sources and calibration sequence, see Figure 1 and Table 1 of Sakai et al., 2025.

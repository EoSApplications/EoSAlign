data_quality_notes: |
  synchrotron XRD measurements and laser annealing, which reduce deviatoric stress and improve lattice parameter accuracy. However, uncertainties are primarily associated with the indirect pressure calibration: the NaCl-B2 scale depends on external Pt-based calibrations (here Fei et al., 2007), introducing systematic pressure uncertainties that can reach several GPa at multi-megabar conditions. Residual nonhydrostatic stress (~4–5 GPa) can affect volume by ~0.4–0.6%, and weak diffraction peaks (notably the hcp 002 reflection) may introduce additional scatter in lattice parameter determination. Furthermore, differences between EoS formulations (Vinet vs. Birch–Murnaghan) contribute to parameter variability, especially in K₀′. Despite these factors, the consistency of volume results across calibrations indicates that the dataset is robust, with uncertainties dominated by pressure scale selection rather than measurement precision.
doi: 10.1002/2014JB011019

data_quality_notes: |
  Ambient-temperature B2 KCl volumes measured in a large-volume multi-anvil press and referenced to NaCl (BE2) as pressure standard. Preferred ambient-T fit (Table 3, bold entry) gives V* = 53.53 A^3/cell (Z=1), K0 = 237 kbar, K0' = 4.4. Ambient-T series covers ~19–81 kbar (Table 2).
doi: 10.2138/am-2002-0701 
notes: |
  Paper derives B2 KCl ambient volume (V0) by fitting the Birch BE1 (Birch–Murnaghan) form to 298 K data because B2 is not stable at 0 GPa. Calibration pressures come from NaCl BE2 (Birch, 1986). Relevant details and tabulated ambient-T points are in Table 2; EOS parameters summarized in Table 3 (preferred bold entry).
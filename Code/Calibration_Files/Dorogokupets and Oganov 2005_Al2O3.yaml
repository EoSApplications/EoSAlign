data_quality_notes: |
  They observe that the Mao et al., 1986 formuation (Power in EoSAlign) does not capture the data.
  To fit their data with that scale they comment that the scale only works to 100 GPa while the scale proposed by Aleksandrov ((polynomial)) works to higher pressures.
doi: Equations of State of Al, Au, Cu, Pt, Ta, and W and Revised Ruby Pressure Scale
notes: |
  "We have constructed semiempirical equations of
  state of Al, Au, Cu, Pt, Ta, and W for temperatures from
  10–15 K up to melting temperature and compression up
  to x = V/V0 = 0.5–0.6 using published experimental
  measurements of the heat capacity, thermal expansion
  coefficient, adiabatic bulk modulus at zero pressure,
  and shock-wave data from Khishchenko et al., 2001"...."Comparing the calculated
  room-temperature isotherms of these metals
  with the data of Dewaele et al. [8]"

# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Dewaele 2019
category: 1
composition: NaCl-B1
method: XRD
technique: DAC
DAC_type: membrane DAC 
culet: 400 um to 100 x 300 (central flat x bevel) #um
cal_to_name: Mao et al., 1986
cal_to_composition: Al2O3 #separate by a ; if multiple compositions are used  
eos: Rydberg-Vinet
order: 3
V0_per_formula_unit: 44.90  
V0_unc: 0.12
K0: 24.0  #GPa
is_K0_fixed: no
K0_unc: 0.8
K0_prime: 5.09
K0_prime_unc: 0.06

K0_dprime:
K0_dprime_unc:
max_pressure: 27 # GPa (transition region); data measured to ~27.6 GPa in B1 for this study
PTM: He
synchrotron: ESRF (ID30, ID27, ID09)
peaks_used_to_fit_sample: 3–8 reflections per spectrum (rock-salt)
reference_temperature: 300 K
sample_heating: none (ambient temperature)
data_quality_notes: |
  B1-phase stable to ~27–36 GPa depending on run.
  Compression quasi-hydrostatic due to He medium.
  Relative volume precision ~5×10⁻⁴.
doi: 10.3390/min9110684

notes: |
  EOS parameters correspond to the Dorogokupets (2007) updated ruby scale,
  which is the unified metrology used throughout the paper (Table 1).
  Transition to B2 occurs near 30 GPa; this YAML covers only the B1 regime.
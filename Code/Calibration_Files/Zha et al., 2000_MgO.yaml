# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Zha et al., 2000
category: 1
composition: MgO
method: XRD
technique: DAC
DAC_type: 
culet: 400 #um
cal_to_name: Absolute
cal_to_composition: MgO
eos: Birch-Murnaghan
order: 3
V0_per_formula_unit: 18.67        # Å^3/formula unit 
K0: 160.2        # GPa (isothermal bulk modulus at 300 K)
K0_unc: 0.7
is_K0_fixed: no
K0_prime: 4.03   # dimensionless
K0_prime_unc: 0.03
K_infinity_prime:
K_infinity_prime_unc:
max_pressure: 55

# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Chijioke et al., 2005
category: 2
composition: Al
method: XRD
technique: Shock
DAC_type: Not Specified
culet: Not Specified
cal_to_name: Mitchell and Nellis 1981; McQueen et al., 1970
cal_to_composition: Al; Al

eos: Vinet-Extended
order:
V0_cc_mole: 9.6882 # #not given assumed from Carter et al., 1971
V0_unc:
K0: 72.6       # GPa (300 K isotherm, Table II; B0)
is_K0_fixed: yes #K0 is fixed at ultrasonic value
K0_unc:
eta: 4.1267       
eta_unc:

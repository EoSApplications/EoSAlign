data_quality_notes: | 
    The gold EOS dataset shows good overall quality, with volumes derived from the (111) diffraction peak to minimize sensitivity to nonhydrostatic stress, though measurements were still conducted without a pressure-transmitting medium . The absence of a PTM introduces residual uniaxial stress, but the (111) plane helps approximate hydrostatic behavior. Data up to 275.1 GPa avoid the strongest effects of peak overlap with Pt, improving reliability compared to higher-pressure fits. The compression trend is smooth and consistent across runs, and agreement with previous hydrostatic studies is within ~1% in volume, indicating strong internal consistency. Uncertainty arises primarily from calibration to the Pt standard (Fratanduono et al., 2021) and from fitting choices, with K0 treated as a free parameter introducing additional variability.
doi:  [https://doi.org/10.1038/s41598-024-61861-2]
notes: |
    This study determines the equation of state of gold using synchrotron XRD in a DAC, fitting a third-order Rydberg-Vinet model with V0 = 16.962 A^3 per atom, K0 = 163 GPa, and K0 prime = 6.18 . Pressure is calibrated to platinum using the Fratanduono et al. (2021) scale, and only the (111) lattice plane is used to approximate hydrostatic compression behavior. The results show a smooth pressure-volume relationship up to 275.1 GPa and are consistent with prior hydrostatic and dynamic studies, supporting gold as a reliable reference material. Allowing K0 to vary provides flexibility in fitting but introduces some uncertainty compared to fixed-parameter approaches. Overall, the study reinforces the validity of Au as a secondary standard and demonstrates reliable EOS determination under nonhydrostatic DAC conditions.

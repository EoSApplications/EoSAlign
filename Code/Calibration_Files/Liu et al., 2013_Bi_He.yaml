# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Liu et al., 2013
category: 2
composition: Bi  # bcc phase (Bi-V)
method: XRD
technique: DAC
DAC_type: Mao–Bell–type DAC
culet: 300  # um
cal_to_name: Mao et al., 1986
cal_to_composition: Al2O3


eos: Rydberg-Vinet
order: 3
V0_per_atom: 31.60  # Å^3; not stated taken from Akahama et al., 2002
V0_unc: 0.04
P0: 0
K0: 41.0  # GPa
is_K0_fixed: no
K0_unc: 1.0
K0_prime: 5.4
K0_prime_unc: 0.1

max_pressure: 50.78  # GPa (fit range upper bound)
PTM: He
synchrotron: NSLS X17C
peaks_used_to_fit_sample: 110; 200; 211; 220
reference_temperature: 300 K
sample_heating: none
data_quality_notes: |
  EOS fit to Bi bcc (Bi-V) P–V data collected in conventional
  diffraction geometry using helium as PTM (EXRD). Fit pressure
  window reported in Table 2: 15.31–50.78 GPa.
doi: 10.1002/pssb.201248414
notes: |
  Reported EOS parameters are from Table 2 (EXRD, He) using a
  Vinet EOS. Low-pressure points are excluded because Bi is not
  fully in the bcc phase until ~8–10 GPa; Table 2 reports only the
  pressure interval used in the fit.
# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Ye et al., 2017
category: 1
composition: Au
method: XRD
technique: DAC
DAC_type: symmetric
culet:  #um
cal_to_name: Dorogokupets and Dewaele 2007
cal_to_composition: Pt
eos: Rydberg-Vinet
order: 3
V0_cc_mole: 10.215 #taken from Dorogokupets and Dewaele 2007
V0_unc:
K0: 167 #GPa
is_K0_fixed: yes
K0_unc:
K0_prime: 5.813
K0_prime_unc: 0.022

max_pressure: 135   # 300 K fits conducted up to this P
PTM: Ne; Ar
gasket: Re
synchrotron: APS GSECARS 13-ID-D; APS HPCAT 16-ID-B
peaks_used_to_fit_sample: 111, 200, 220, 311, 222 (Au)  # page 3 figure
sample_heating: laser annealed >1900 K

data_quality_notes: |
  Au and MgO were mixed as powders and laser annealed to reduce deviatoric stress.
  EOS refined by fixing K0 and V0 to Dorogokupets & Dewaele (2007) values, fitting only K′0.
  Au scale consistent with MgO and Pt within ±1 GPa up to 135 GPa at 300 K.

doi: 10.1002/2016JB013811
notes: |
  This Au EOS is part of the internally consistent Au–Pt–MgO calibration set optimized
  in Ye et al. (2017). Only K′0 was refined; K0 and V0 follow Dorogokupets & Dewaele (2007).
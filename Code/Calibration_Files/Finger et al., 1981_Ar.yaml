data_quality_notes: Argon crystallizes into fcc at 11.5 ± 0.5 kbar and remains fcc to 82 kbar. Sharp single-crystal diffraction maxima were obtained up to 80 kbar (minor spot diffuseness above ~80 kbar). Unit-cell volumes are accurate to ±0.02% (diffractometer) or ±0.05% (film). EOS fitted with fixed V0 and K0 derived from low-temperature measurements.  # Table I & Table II.
doi: 10.1063/1.92597
notes: The EOS follows the exact "second-order Murnaghan" expression of Finger et al., incorporating static K0, K0', Debye-derived Pz0, and the derived q parameter. No phase transitions were observed; argon remains fcc to 82 kbar.

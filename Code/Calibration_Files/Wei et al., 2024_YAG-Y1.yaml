data_quality_notes: | 
    The Sm³⁺:YAG fluorescence sensor (particularly the Y₁ line) exhibits generally high data quality with relatively stable peak positions and lower temperature sensitivity compared to ruby, but several factors still limit precision under extreme conditions . As shown in the spectra and temperature trends (e.g., Fig. 6 and Fig. 9), peak broadening and intensity reduction occur at elevated temperatures, and line overlap (especially between Y₁ and Y₂) can complicate peak identification at high P–T conditions. Although temperature effects are smaller than in ruby, they are not negligible—ignoring them can introduce pressure errors of several GPa at high temperatures. Data consistency also depends on calibration choice and reference standards, with differences in prior studies attributed to synthesis variations, fitting methods (linear vs nonlinear), and pressure scales. Additionally, non-hydrostatic effects are present but generally smaller than for ruby, improving reliability in DAC environments.
doi: 10.1063/5.0178597 
notes: | 
    Other fits are prospoed in this study we have selected equation 10 and table 4. Sm³⁺-doped yttrium aluminum garnet (YAG) is an optical pressure sensor that uses luminescence peak shifts (notably the Y₁ transition) to determine pressure in high-pressure experiments . It is valued for its lower temperature sensitivity compared to ruby and its ability to operate over a wider temperature range, making it suitable for high-temperature DAC studies. The Y₁ line shows a predictable pressure-dependent shift and becomes more sensitive than ruby at higher pressures (above ~30 GPa), improving its usefulness in extreme conditions.

data_quality_notes: |
  Volume uncertainties are ~±0.01 Å³/atom, and pressure uncertainties increase with compression due to systematic ruby-scale contributions. Ab initio PAW calculations benchmarked against all-electron methods show strong methodological consistency; however, GGA-PBE overestimates equilibrium volume, underestimates K₀, and overestimates K₀′, leading to an increasingly stiff compression curve at high pressure, while LDA underestimates V₀ and overestimates K₀. Overall, the Zn dataset is high quality within the measured pressure range and provides an important benchmark for highly anisotropic transition metals in both pressure calibration and DFT performance evaluation.

data_quality_notes: >
  Single-crystal diamond (1.1% 13C) was measured in helium PTM under quasi-hydrostatic
  conditions up to 140 GPa. Ruby pressures are constrained to ±1% to 55 GPa using the
  Zha et al. (2000) MgO elasticity scale and agree with the Au EOS in He to 124 GPa.
  Six diamond reflections were tracked, showing minimal broadening, confirming excellent
  hydrostaticity. The Vinet EOS fit to XRD data gives V0 = 3.4170(8) cm^3/mol,
  K0 = 446(1) GPa, K0' = 3.0(1). The fit reproduces pressures within <1% to 140 GPa.

doi: 10.1038/nmat831

notes: >
  This EOS corresponds to the static isothermal (300 K) diamond EOS. It is used for
  absolute pressure calibration and for comparison with diamond Raman gauge calibrations.
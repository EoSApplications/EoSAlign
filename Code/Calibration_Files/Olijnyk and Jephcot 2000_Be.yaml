data_quality_notes: |
  Raman spectra collected to 23 GPa using Ar+ 514.5 nm laser excitation. The transverse-optical (E2g) zone-center phonon is the only Raman-active mode in Be.Pressures were determined from the Relative Wavenumbers of a Zn reference loaded with Be. No anomalies or discontinuities in ν(P) were observed in the 8.6–14.5 GPa range, where an hcp → distorted-hcp transition had been previously claimed from XRD. The frequency shift is positive and smooth across the full range.

doi: 10.1088/0953-8984/12/41/317

notes: |
  Equation (1) parameters δ0 and δ0' define the nonlinear ν(P) dependence. Authors relate the TO frequency to the elastic shear modulus C44.They find Be’s unusually low mode Grüneisen parameter arises from a high C44 relative to its bulk modulus. No structural transition is detected by Raman to 23 GPa.
data_quality_notes: |
  NaCl-B2 EoS was not measured directly in this study but was recalibrated using volume–volume relationships from simultaneous compression experiments of Pt–NaCl, Au–NaCl, and MgO–NaCl, based on previously published data (see main text and references 36, 38, 39).
  EoS is anchored to the B1–B2 transition at 32.3 GPa, V = 27.25 Å³/unit cell (Matsui et al., 2012).
  Parameters were fitted using the internally consistent scale established in this work.
doi: https://doi.org/10.1038/s43246-025-00792-5
notes: |
  The NaCl-B2 EoS in Sakai et al., 2025 is not from new experiments but is recalibrated using simultaneous compression data from previous studies (mainly Dorfman et al., 2012; Sata et al., 2002; Sakai et al., 2011) and anchored at the B1–B2 transition (32.3 GPa, Matsui et al., 2012), using the new internally consistent pressure scale developed in this work.

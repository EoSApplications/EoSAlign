# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Jing et al., 2013
category: 1
composition: SrB4O7 #Sm2+
method: Luminescence
technique: DAC
DAC_type: Mao-Bell DAC
culet: 300-150 #um
cal_to_name: Mao et al., 1986
cal_to_composition: Al2O3
eos: Datchi97_Equation  #Pressure=A*Δλ (1+BΔλ)/(1+CΔλ)
A: 4.016
A_unc:
B: 0.00836
B_unc: 0.00959
C: 0.0218
C_unc: 0.011
lambda_0: 685.41  # nm
max_pressure: 48  # GPa
PTM: Ar
gasket: T301 stainless steel
synchrotron: BSRF 4W2
peaks_used_to_fit_sample:
reference_temperature: 300 #K
sample_heating: #sample was heated to 880 C Prior to loading in the DAC
data_quality_notes: 
doi: [http://dx.doi.org/10.1063/1.4774113]
notes: Quasi-hydrostatic calibration performed with Ar as PTM and ruby as the pressure standard up to 48 GPa. Non-hydrostatic calibration performed without PTM, using Au EOS as pressure standard, up to 127 GPa.
data_quality_notes: |
    Volume uncertainties are ~±0.01 Å³/atom, while pressure uncertainties increase with compression due to systematic ruby-scale effects. Ab initio PAW calculations benchmarked against all-electron methods show excellent internal consistency; however, GGA-PBE slightly overestimates equilibrium volume and K₀′ and underestimates K₀ at ambient pressure, leading to a compression curve that becomes too stiff at high pressure, whereas LDA underestimates V₀ and overestimates K₀. Overall, the Ni dataset is high quality across the measured range and serves as a strong benchmark for pressure calibration and DFT validation.

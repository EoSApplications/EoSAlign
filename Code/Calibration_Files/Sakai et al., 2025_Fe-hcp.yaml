# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Sakai et al., 2025
category: 1
composition: Fe-hcp
method: XRD
technique: DAC
DAC_type: tDAC
culet: 20 #um (Run #6; see Table 1)
cal_to_name: Sakai et al., 2025
cal_to_composition: W
cal_to_eos: Rydberg-Stacey
eos: Rydberg-Stacey
V0: 22.42 # A^3/unit cell, see Table 2 (±0.06)
V0_unc: 0.06 # see Table 2
K0: 161.9 # GPa, see Table 2 (±4.5)
K0_unc: 4.5 # GPa, see Table 2
K0_prime: 5.51 # see Table 2 (±0.08)
is_K0_fixed: no
K0_prime_unc: 0.08 # see Table 2
K_infinity_prime: 1.6666666 # Fixed, see Table 2 and text; value is 5/3
K_infinity_prime_unc: fixed
max_pressure: 324 # GPa (see Table 1, Run #6, tDAC)
PTM: None
gasket: W for runs 7a, 7b and 7c; Re for rest 
synchrotron: SPring-8 BL10XU and BL37XU
peaks_to_fit_sample:
reference_temperature: 300 # K (ambient, no intentional heating)
sample_heating: No heating or laser annealing was applied; measurements performed at ambient temperature. See Methods.
data_quality_notes: |
  Data from multiple calibration paths (Cu → W → Fe, Cu → Re → Pt → NaCl → Fe, and Ruby scale) are internally consistent within 0.3% in volume up to 324 GPa. 
  Rydberg–Stacey EoS fit agrees within 0.1–0.2% in volume with recent ramp compression studies at Earth’s core conditions (136–364 GPa).
  Some volume uncertainty due to limited measured diffraction peaks in Fe-hcp at high pressure.
doi: https://doi.org/10.1038/s43246-025-00792-5
notes: |
  Iron (hcp phase) equation of state was calibrated using t-DAC up to 324 GPa (culet 20 um, Run #6), using tungsten as the pressure calibrant.
  Calibration path for this run: Cu → W → Fe (see Figure 1).
  All EoS parameters (except K0_prime, which was refined) were fixed to literature values as listed in Table 2.
  Rydberg–Stacey EoS parameters for Fe-hcp: V0 = 22.42 ± 0.06 Å³/unit cell; K0 = 161.9 ± 4.5 GPa; K0' = 5.51 ± 0.08; K_infinity' = 5/3.
  For further details on experimental runs, data sources, calibration sequence, and fit quality, see Table 1, Table 2, and Figure 1 of Sakai et al., 2025.

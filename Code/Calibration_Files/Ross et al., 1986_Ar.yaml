category: 3
composition: Ar  # solid argon, fcc
method: XRD
technique: DAC
DAC_type: diamond-window DAC
cal_to_name: Piermarini et al., 1975
cal_to_composition: Al2O3  # ruby
eos: Birch-Murnaghan  # Fit in EoSAlign paper to the data in table 1
order: 3
V0_cc_mole: 21.343   # cm^3/mol (liquid Ar reference at 87 K, used in Hugoniot reduction)
V0_unc: 3.78
K0: 5.6987
is_K0_fixed: no
K0_unc: 6.06
K0_prime: 5.5081

# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Sakai et al., 2025
category: 1
composition: Pt
method: XRD
technique: DAC
DAC_type: tDAC
culet: 20 #um
cal_to_name: Sakai et al., 2025
cal_to_composition: Re
cal_to_eos: Rydberg-Stacey
eos: Rydberg-Stacey
V0: 60.409 # A^3/unit cell, calculated from the density value, 21.45 g/cm³ (NIST), as noted in Table 2
K0: 274.1 # GPa, Kamada et al., 2019
is_K0_fixed: yes
K0_prime: 5.128 # Kamada et al., 2019
K0_prime_unc: 0.009 # Kamada et al., 2019
K_infinity_prime: 1.66667 # Fixed, see Table 2 and text; value is 1.666...
K_infinity_prime_unc: fixed
max_pressure: 394 # GPa (see Table 1, Run #2, t-DAC)
PTM: None
gasket: W for runs 7a, 7b and 7c; Re for rest 
synchrotron: SPring-8 BL10XU and BL37XU
peaks_to_fit_sample:
reference_temperature: 300 # K (ambient, no intentional heating)
sample_heating: No heating or laser annealing was applied; measurements performed at ambient temperature. See Methods and Table 1.
data_quality_notes: No significant data scatter reported; unit cell volume measurements for Pt are consistent across the pressure range investigated.
doi: https://doi.org/10.1038/s43246-025-00792-5
notes: |
  Platinum equation of state was calibrated using t-DAC up to 394 GPa (culet 20 um, Run #2).
  Calibration path: Cu → Re → Pt. All EoS parameters (except K0_prime, which was refined) were fixed to values from Kamada et al., 2019, as cited by Sakai et al., 2025.
  The Rydberg–Stacey EoS parameters for Pt are listed in Table 2.
  For further details on data sources and calibration sequence, see Figure 1 and Table 1 of Sakai et al., 2025.

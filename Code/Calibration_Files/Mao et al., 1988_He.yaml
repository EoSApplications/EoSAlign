# This is a yaml file based on data published in the study listed below. All values listed are based on what can be found within the publication.This document was updated February  2026, any changes to the manuscript after this date have not been added.
study: Mao et al., 1988
category: 3
composition: He  # solid helium, hcp phase
method: XRD
technique: DAC
DAC_type: single-crystal DAC
culet: not specified  # um
cal_to_name: Mao et al., 1986
cal_to_composition: Al2O3  # ruby


eos: Birch-Murnaghan  # Fit in EoSAlign paper to the data in table 1, note that there are 4 data point in this study
order: 3
V0_cc_mole: 3.944 #fixed, @ 15.6 GPa!
P0: 15.6  # GPa, first data point
V0_unc: 0.009
K0: 34.078
is_K0_fixed: no
K0_unc: 1.62
K0_prime: 6.6593
K0_prime_unc: 0.784


max_pressure: 23.3  # GPa
PTM: He #none (self)
synchrotron: CHESS (Cornell High Energy Synchrotron Source)
peaks_used_to_fit_sample: 101; 011; 102; 110; 112
reference_temperature: 300 K
sample_heating: none
data_quality_notes: |
  Single-crystal X-ray diffraction measurements of solid helium
  were performed between 15.6 and 23.3 GPa at 300 K.
  Six diffraction peaks were indexed to the hcp structure
  (space group P63/mmc) with ideal c/a ≈ 1.633.
  Pressure homogeneity was confirmed by identical readings
  from three ruby chips, indicating quasihydrostatic conditions.
doi: 10.1103/PhysRevLett.60.2649
notes: |
  This study provides the first direct single-crystal XRD
  determination of the crystal structure and pressure–volume
  relations of solid helium at high pressure. The authors do
  not report a closed-form analytical EOS (e.g., BM or Vinet);
  instead, tabulated P–V data at 300 K are compared against
  theoretical EOS calculations.
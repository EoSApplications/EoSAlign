data_quality_notes: |
    Volume uncertainties are ~±0.01 Å³/atom, and pressure uncertainties increase with compression (systematic ruby-scale component). Ab initio PAW calculations benchmarked against all-electron results show strong internal consistency; however, GGA-PBE slightly overestimates equilibrium volume and overestimates K₀′, leading to a compression curve that becomes too stiff at high pressure, while LDA underestimates V₀ and overestimates K₀. Overall, the Co-hcp dataset is high quality across the measured range and provides a robust benchmark for pressure calibration and DFT validation.
doi: [https://doi.org/10.1103/PhysRevB.78.104102]
notes: |
  Table IV Vinet fit (DAC PR′). V0 fixed from low-P data; K0 and K0′ are fit parameters. 

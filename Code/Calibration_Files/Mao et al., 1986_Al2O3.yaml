method: Luminescence
technique: DAC
DAC_type: not specified
culet: not specified
cal_to_name: Mao et al., 1986; Zou et al., 1982; Carter et al., 1971; Carter et al., 1971
cal_to_composition: Cu; Ag; Cu; Ag

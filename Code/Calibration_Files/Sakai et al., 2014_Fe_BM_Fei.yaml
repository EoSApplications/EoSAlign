data_quality_notes: |
  ymmetric DAC combined with laser annealing, which minimizes deviatoric stress and allows accurate determination of lattice parameters from multiple diffraction peaks. However, uncertainties arise from the indirect nature of the pressure calibration: NaCl-B2 is tied to external Pt-based scales (Fei et al., 2007), introducing systematic dependence on those reference EoSs. The zero-pressure volume V₀ is not directly measured but derived from g–G analysis, contributing additional uncertainty. Differences between pressure scales can lead to deviations of several GPa (up to ~10% near 300 GPa), and residual nonhydrostatic stress (on the order of a few GPa) can affect volume by ~0.4–0.6% at high pressure. Despite these limitations, agreement with independent quasi-hydrostatic studies indicates that the calibration is robust within typical uncertainties for high-pressure DAC experiments

doi: 10.1002/2014JB011019
notes: |
      In Sakai et al. (2014), the NaCl-B2 phase is used as an internal pressure scale for DAC experiments, calibrated indirectly to Pt-based standards through previous work (Sakai et al., 2011), specifically adopting the Fei et al. (2007) calibration. The pressure is determined using a third-order Birch–Murnaghan equation of state without fixing K₀, allowing full parameter fitting. For the Fei-based calibration, the NaCl-B2 EoS parameters are approximately V₀ ≈ 37.73 Å³ (from g–G analysis), K₀ ≈ 47.80 GPa, and K₀′ ≈ 4.06. This calibration provides a pressure scale consistent with internally self-consistent Pt standards and is applied to determine the compression behavior of Fe at high pressures.

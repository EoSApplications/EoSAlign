data_quality_notes: |
    Volume uncertainties are ~±0.01 Å³/atom, with pressure uncertainties increasing systematically with compression. Ab initio PAW calculations, validated against all-electron methods, show strong internal consistency; however, GGA-PBE slightly overestimates equilibrium volume and K₀′ while underestimating K₀ at ambient pressure and becomes too stiff at high compression, whereas LDA underestimates V₀ and overestimates K₀. Overall, the Mo dataset is high quality below 100 GPa and provides a robust benchmark for pressure-scale calibration and DFT performance under strong compression.

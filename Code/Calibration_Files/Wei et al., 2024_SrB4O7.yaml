ata_quality_notes: | 
     Temperature was  controlled and cross-checked, with overall uncertainty constrained to ~1%, and spectral calibration was rigorously validated. The authors explicitly quantify temperature–pressure coupling, demonstrating that neglecting temperature effects leads to systematic pressure underestimation—up to ~2.5 GPa for Sm²⁺:SrB₄O₇ and ~3.9–4.6 GPa for Sm³⁺:YAG at the highest P–T conditions—while ruby becomes unreliable above ~750–800 K due to line broadening and overlap. Empirical power-law calibrations including temperature-dependent terms reproduce experimental data within ~1–2.5 GPa across the full range.
doi: 10.1063/5.0178597 
notes: |
        Other fits are proposed in this study, and we have selected equation 10 and table 4. Among the sensors studied, Sm²⁺:SrB₄O₇ (λ₁ line) exhibits the best spectral quality, minimal thermal quenching, and lowest sensitivity to non-hydrostatic stress, making it the most robust fluorescence pressure marker for high-temperature DAC experiments, although the authors note that future refinement would benefit from calibration against primary EOS standards such as Au or Pt.
